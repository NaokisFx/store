<style>
  * { box-sizing: border-box; }
  html, body { background:#070809; margin:0; padding:0; scroll-behavior:smooth; }
  body { font-family: 'Barlow', sans-serif; overflow-x:hidden; }
  ::selection { background: #D4AF37; color:#070809; }

  ::-webkit-scrollbar{ width:10px; }
  ::-webkit-scrollbar-track{ background:#0B0D10; }
  ::-webkit-scrollbar-thumb{ background:#3a3424; border-radius:8px; }
  ::-webkit-scrollbar-thumb:hover{ background:#D4AF37; }

  /* ---------- LIQUID GLASS ---------- */
  .liquid-glass {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(212,175,55,0.45) 0%,
      rgba(212,175,55,0.15) 20%,
      rgba(212,175,55,0) 40%,
      rgba(212,175,55,0) 60%,
      rgba(212,175,55,0.15) 80%,
      rgba(212,175,55,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass-strong {
    background: rgba(255,255,255,0.02);
    background-blend-mode: luminosity;
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
    border: none;
    box-shadow: 4px 4px 12px rgba(0,0,0,0.25), inset 0 1px 1px rgba(255,255,255,0.15);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass-strong::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(212,175,55,0.6) 0%,
      rgba(212,175,55,0.25) 20%,
      rgba(212,175,55,0) 40%,
      rgba(212,175,55,0) 60%,
      rgba(212,175,55,0.25) 80%,
      rgba(212,175,55,0.6) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  .card-glass {
    background: rgba(255,255,255,0.025);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(212,175,55,0.18);
    box-shadow: 0 8px 30px rgba(0,0,0,0.35), inset 0 1px 1px rgba(255,255,255,0.06);
  }

  .text-gradient-gold {
    background: linear-gradient(135deg, #F6E9BB 0%, #D4AF37 45%, #8F701F 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  /* ---------- ANIMATED BACKGROUNDS PER CATEGORY ---------- */

  /* HERO — ARK: ember particles rising + slow amber fog drift */
  .bg-hero {
    position:absolute; inset:0; z-index:0; overflow:hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(212,175,55,0.18), transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(139,69,19,0.25), transparent 60%),
      linear-gradient(180deg, #0c0a06 0%, #070809 55%, #050505 100%);
  }
  .bg-hero::after{
    content:""; position:absolute; inset:-10%;
    background-image:
      radial-gradient(circle, rgba(212,175,55,0.5) 0 1px, transparent 1px);
    background-size: 60px 60px;
    animation: emberDrift 18s linear infinite;
    opacity:0.35;
  }
  @keyframes emberDrift {
    0%{ transform:translateY(0) translateX(0); }
    100%{ transform:translateY(-220px) translateX(40px); }
  }
  .fog-layer{
    position:absolute; inset:0; pointer-events:none;
    background: linear-gradient(120deg, transparent 30%, rgba(180,130,40,0.06) 50%, transparent 70%);
    animation: fogDrift 14s ease-in-out infinite alternate;
  }
  @keyframes fogDrift{
    0%{ transform: translateX(-10%) scale(1.1); }
    100%{ transform: translateX(10%) scale(1.2); }
  }

  /* AMBER section — amber resin drips / glow blobs */
  .bg-amber-sec{
    position:absolute; inset:0; z-index:0; overflow:hidden;
    background: linear-gradient(180deg, #0a0703 0%, #0B0D10 100%);
  }
  .blob-amber{
    position:absolute; border-radius:50%; filter:blur(40px);
    background: radial-gradient(circle, rgba(217,140,20,0.55), rgba(217,140,20,0) 70%);
    animation: blobFloat 12s ease-in-out infinite;
  }
  @keyframes blobFloat{
    0%,100%{ transform: translate(0,0) scale(1); }
    50%{ transform: translate(30px,-40px) scale(1.15); }
  }

  /* ARKEOTIPOS section — circuit / artifact glyph drift */
  .bg-arkeo{
    position:absolute; inset:0; z-index:0; overflow:hidden;
    background: linear-gradient(180deg, #070809 0%, #0c0e10 100%);
  }
  .bg-arkeo::before{
    content:"";
    position:absolute; inset:-20%;
    background-image:
      repeating-linear-gradient(0deg, rgba(212,175,55,0.05) 0 1px, transparent 1px 40px),
      repeating-linear-gradient(90deg, rgba(212,175,55,0.05) 0 1px, transparent 1px 40px);
    animation: gridShift 20s linear infinite;
  }
  @keyframes gridShift{
    0%{ transform: translate(0,0); }
    100%{ transform: translate(40px,40px); }
  }

  /* LEVELS section — rising XP bars glow */
  .bg-levels{
    position:absolute; inset:0; z-index:0; overflow:hidden;
    background: linear-gradient(180deg, #070809 0%, #0a0c0e 100%);
  }
  .bar-rise{
    position:absolute; bottom:-10%; width:3px;
    background: linear-gradient(180deg, rgba(212,175,55,0.0), rgba(212,175,55,0.6));
    animation: riseUp 6s ease-in-out infinite;
  }
  @keyframes riseUp{
    0%{ height:10%; opacity:0.2; }
    50%{ height:70%; opacity:0.8; }
    100%{ height:10%; opacity:0.2; }
  }

  /* CRUNCHYROLL / Entretenimiento — orange/pink anime gradient waves */
  .bg-anime{
    position:absolute; inset:0; z-index:0; overflow:hidden;
    background: linear-gradient(160deg, #1a0a05 0%, #0B0D10 60%);
  }
  .wave-anime{
    position:absolute; width:200%; height:200%; left:-50%; top:-50%;
    background: conic-gradient(from 0deg, rgba(255,98,0,0.12), rgba(255,0,110,0.08), rgba(255,98,0,0.12));
    animation: spinSlow 30s linear infinite;
    filter: blur(60px);
  }
  @keyframes spinSlow{ 100%{ transform: rotate(360deg); } }

  /* FREE FIRE — tactical orange/red diagonal scan */
  .bg-ff{
    position:absolute; inset:0; z-index:0; overflow:hidden;
    background: linear-gradient(180deg, #160803 0%, #0B0D10 70%);
  }
  .scan-ff{
    position:absolute; inset:-20%;
    background: repeating-linear-gradient(115deg, rgba(255,140,30,0.07) 0 2px, transparent 2px 26px);
    animation: scanMove 9s linear infinite;
  }
  @keyframes scanMove{
    0%{ transform: translateX(0); }
    100%{ transform: translateX(120px); }
  }

  /* BLOODSTRIKE — crimson pulse grid */
  .bg-bs{
    position:absolute; inset:0; z-index:0; overflow:hidden;
    background: linear-gradient(180deg, #150404 0%, #0B0D10 70%);
  }
  .pulse-bs{
    position:absolute; inset:0;
    background: radial-gradient(circle at 50% 50%, rgba(190,20,20,0.25), transparent 60%);
    animation: pulseBeat 4s ease-in-out infinite;
  }
  @keyframes pulseBeat{
    0%,100%{ opacity:0.3; transform:scale(1); }
    50%{ opacity:0.7; transform:scale(1.08); }
  }

  /* RECARGAS VARIAS / contacto — gold sparkle field */
  .bg-contact{
    position:absolute; inset:0; z-index:0; overflow:hidden;
    background: radial-gradient(ellipse 70% 60% at 50% 30%, rgba(212,175,55,0.15), transparent 65%), #070809;
  }
  .sparkle{
    position:absolute; border-radius:50%;
    background: #F6E9BB;
    box-shadow: 0 0 8px 2px rgba(246,233,187,0.8);
    animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle{
    0%,100%{ opacity:0.15; transform:scale(0.8); }
    50%{ opacity:1; transform:scale(1.3); }
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; }
  }

  .focus-gold:focus-visible{
    outline: 2px solid #D4AF37;
    outline-offset: 3px;
  }

  .clip-corner{
    clip-path: polygon(0 0, 100% 0, 100% 85%, 85% 100%, 0 100%);
  }
</style>
</head>
<body>
  <div id="root">
    <div id="fallback-loader" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#070809;color:#D4AF37;font-family:sans-serif;text-align:center;padding:20px;">
      <div>
        <div style="font-size:14px;opacity:0.7;">Cargando Legend Gold…</div>
      </div>
    </div>
  </div>

  <script>
    // Si después de 6 segundos React no ha montado nada (el loader sigue presente),
    // mostramos un mensaje de error en vez de dejar la pantalla en negro.
    window.addEventListener('load', function () {
      setTimeout(function () {
        var loader = document.getElementById('fallback-loader');
        if (loader && document.getElementById('root').children.length === 1) {
          loader.innerHTML =
            '<div style="max-width:480px;color:#fff;">' +
            '<div style="font-size:18px;color:#D4AF37;margin-bottom:10px;">No se pudo cargar la tienda</div>' +
            '<div style="font-size:13px;opacity:0.8;line-height:1.5;">Esto suele pasar por falta de conexión a internet para cargar React/Tailwind desde el CDN, o porque el navegador bloqueó algún script. Revisa la consola (F12) para ver el detalle, o intenta abrir el archivo con conexión a internet activa.</div>' +
            '</div>';
        }
      }, 6000);
    });
  </script>

  <script type="text/babel" data-presets="react">

    /* ============ ICONS ============ */

    const DiscordIcon = ({className="h-5 w-5"}) => (
      <svg viewBox="0 0 24 24" className={className} fill="currentColor">
        <path d="M20.317 4.369A19.79 19.79 0 0 0 15.885 3c-.21.375-.444.875-.608 1.262a18.27 18.27 0 0 0-5.554 0A12.5 12.5 0 0 0 9.115 3 19.74 19.74 0 0 0 4.68 4.37C2.05 8.21 1.32 11.96 1.6 15.66a19.9 19.9 0 0 0 5.99 3.03c.49-.67.92-1.39 1.29-2.14a12.9 12.9 0 0 1-2.03-.97c.17-.13.34-.26.5-.4a14.2 14.2 0 0 0 12.3 0c.16.14.33.27.5.4-.65.38-1.33.7-2.04.97.37.75.8 1.47 1.29 2.14a19.9 19.9 0 0 0 5.99-3.03c.34-4.3-.7-8.01-2.79-11.29ZM8.68 13.33c-.83 0-1.5-.76-1.5-1.69s.66-1.69 1.5-1.69 1.51.77 1.5 1.69c0 .93-.66 1.69-1.5 1.69Zm6.64 0c-.83 0-1.5-.76-1.5-1.69s.66-1.69 1.5-1.69 1.51.77 1.5 1.69c0 .93-.65 1.69-1.5 1.69Z"/>

    /* ============ BLUR TEXT ============ */
    function BlurText({ text, className }) {
      const ref = useRef(null);
      const [show, setShow] = useState(false);
      useEffect(() => {
        const obs = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) setShow(true); });
        }, { threshold: 0.1 });
        if (ref.current) obs.observe(ref.current);
        return () => obs.disconnect();
      }, []);
      const words = text.split(" ");
      return (
        <p ref={ref} className={className} style={{display:'flex', flexWrap:'wrap', justifyContent:'center', rowGap:'0.1em'}}>
          {words.map((w, i) => (
            <motion.span
              key={i}
              initial={{ filter: 'blur(10px)', opacity: 0, y: 50 }}
              animate={show ? {
                filter: ['blur(10px)', 'blur(5px)', 'blur(0px)'],
                opacity: [0, 0.5, 1],
                y: [50, -5, 0]
              } : {}}
              transition={{ duration: 0.7, times: [0,0.5,1], ease: "easeOut", delay: (i*100)/1000 }}
              style={{ display:'inline-block', marginRight:'0.28em' }}
            >{w}</motion.span>
          ))}
        </p>
      );
    }

              {links.map(l => (

    /* ============ HERO ============ */
    function Hero() {
      return (
        <section id="top" className="relative min-h-screen flex flex-col overflow-hidden">

            <div className="fog-layer"></div>
          </div>

          <div className="relative z-10 flex-1 flex flex-col items-center justify-center px-4 pt-28 pb-10">

              transition={{ duration:0.6, ease:"easeOut", delay:0.4 }}

            >
              <span className="bg-gold-400 text-ink-900 px-3 py-1 text-xs font-semibold rounded-full">Tienda</span>

            <h1 className="text-5xl md:text-7xl lg:text-[5.5rem] font-heading italic text-white leading-[0.85] max-w-3xl text-center tracking-tight">

            <motion.p

              transition={{ duration:0.6, ease:"easeOut", delay:0.8 }}
              className="mt-5 text-sm md:text-base text-white/80 max-w-xl text-center font-body font-light leading-relaxed"
            >
              Legend Gold es tu tienda de confianza para recargas de ARK, ámbar, arkeotipos y subida de niveles para tus dinos —

            </motion.p>

            <motion.div
